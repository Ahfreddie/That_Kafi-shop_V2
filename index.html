<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Th@ Kafi Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="index.html"
          ><img
            src="./assets/images/doodles/CoffeeDoddle.svg"
            alt="company logo"
            class="icon"
            width="80px"
        /></a>
        <div class="nav-links">
          <ul>
            <li class="navlink"><a href="#menu">Th@ Kaffe Menu</a></li>

            <li class="navlink"><a href="#about">Our Story</a></li>

            <li class="navlink"><a href="#community">Community</a></li>
          </ul>
        </div>

        <!-- the buttons go on the left -->
        <div class="nav-btns">
          <button class="sign-in btn">Sign in</button>
          <button class="join btn">Join the Story</button>
        </div>
      </nav>
    </header>

    <main>
      <section class="banner">
        <h1>Your next story begins in th@ Kafi Shop</h1>
        <button class="btn banner-btn">Grab a Coffee</button>
      </section>

      <section class="hero-section">
        <!-- hero is divide into two sides left (image) and right (text content) -->

        <div class="hero-img">
          <img
            src="./assets/images/mockups/ChatGPT Image Apr 25, 2026, 11_41_33 PM.png"
            alt="a paper cup of coffee" />
        </div>

        <div class="hero-txt">
          <h2 class="hero-h">A good story starts with a good brew</h2>
          <p class="hero-p">
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Reiciendis
            minus itaque voluptatem perspiciatis eos.
          </p>
          <button class="btn hero-cta">Explore the taste</button>
        </div>
      </section>
    </main>
  </body>
</html>
